name: Build & Publish Docker image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - ci/docker-publish
    paths-ignore:
      - "**.md"
      - "ROADMAP.md"

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: [self-hosted, kubero]
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            LIBREDESK_VERSION=${{ steps.version.outputs.version }}
            VITE_APP_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Published image" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ env.IMAGE }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  deploy:
    # Roll the freshly built image out to prod (kubero-prod / ns libredesk).
    # Only on main builds; uses a namespace-scoped ServiceAccount (patch the
    # single libredesk Deployment, nothing else).
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, kubero]
    steps:
      - name: Deploy to prod
        env:
          IMAGE_REF: ${{ env.IMAGE }}@${{ needs.build.outputs.digest }}
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_PROD_B64 }}
        run: |
          set -euo pipefail
          KCFG="$RUNNER_TEMP/kubeconfig"
          trap 'rm -f "$KCFG"' EXIT
          printf '%s' "$KUBECONFIG_B64" | base64 -d > "$KCFG"
          export KUBECONFIG="$KCFG"
          echo "Rolling out image: $IMAGE_REF"
          kubectl -n libredesk set image deploy/libredesk libredesk="$IMAGE_REF"
          kubectl -n libredesk rollout status deploy/libredesk --timeout=300s
          echo "### Deployed to prod" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$IMAGE_REF" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
